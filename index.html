<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hva skjer under overflaten i teamet ditt?</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta
      name="description"
      content="En premium quiz for å avdekke skjulte mønstre som påvirker beslutninger, samarbeid og fremdrift i teamet ditt."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>
      <main id="app" class="app" aria-live="polite"></main>
      <div id="kajabi-step" class="quiz-step hidden">
        <div class="kajabi-step-content panel">
          <div class="kajabi-copy">
            <h2 class="question-title">Vil du se diagnosen din?</h2>
            <p>
              Legg inn navn og e-post, så sender jeg deg resultatet ditt – med en kort forklaring på hva som sannsynligvis preger teamet ditt akkurat nå.
            </p>
            <p class="kajabi-support">
              Du får også relevante oppfølginger knyttet til utfordringen quizen peker på.
            </p>
          </div>

          <div class="kajabi-visible-form">
            <form id="visible-lead-form" class="visible-lead-form" novalidate>
              <div class="visible-field">
                <label for="visible-name">Navn</label>
                <input id="visible-name" name="visible_name" type="text" autocomplete="name" />
              </div>
              <div class="visible-field">
                <label for="visible-email">E-post</label>
                <input id="visible-email" name="visible_email" type="email" autocomplete="email" />
              </div>
              <p id="visible-form-error" class="visible-form-error hidden"></p>
              <button type="submit" class="button">Se resultatet mitt</button>
            </form>
          </div>

          <div class="kajabi-hidden-host" aria-hidden="true">
            <iframe name="kajabi-background-target" id="kajabi-background-target" class="kajabi-background-target"></iframe>
            <div id="kajabi-form-wrapper" class="kajabi-form-wrapper">
              <script src="https://www.designlinking.no/forms/2149518448/embed.js"></script>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.QUIZ_CONFIG = window.QUIZ_CONFIG || {};
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
